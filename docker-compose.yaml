version: "3.8"

services:
  bot:
    build: .
    command: python3 main.py
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - API_KEY=${API_KEY}  
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    networks:
      - app_network

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"  # RabbitMQ Management Plugin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  rabbitmq_data:

networks:
  app_network:
